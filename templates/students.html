<!DOCTYPE html>
<html>
<head>
    <title>Manage Students</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f8fbff;
            color: #1f2937;
        }

        .topbar {
            background: #0f172a;
            color: white;
            padding: 18px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar h2 {
            margin: 0;
        }

        .back-btn {
            text-decoration: none;
            background: #2563eb;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
        }

        .container {
            max-width: 1100px;
            margin: 25px auto;
            padding: 0 20px;
        }

        .table-box {
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 14px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
        }

        th {
            background: #eff6ff;
            color: #1e3a8a;
        }

        tr:hover {
            background: #f8fafc;
        }

        .delete-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .delete-btn:hover {
            background: #b91c1c;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <h2>Manage Students</h2>
        <a class="back-btn" href="/">Back</a>
    </div>

    <div class="container">
        <div class="table-box">
            <table>
                <tr>
                    <th>Student ID</th>
                    <th>Name</th>
                    <th>Folder</th>
                    <th>Action</th>
                </tr>
                {% for student in students %}
                <tr>
                    <td>{{ student.student_id }}</td>
                    <td>{{ student.name }}</td>
                    <td>{{ student.folder }}</td>
                    <td>
                        <form method="POST" action="/delete_student/{{ student.folder }}" onsubmit="return confirm('Are you sure you want to delete this student?');">
                            <button type="submit" class="delete-btn">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </table>
        </div>
    </div>
</body>
</html>
